<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcessDaemon 控制台</title>
    <style>
        :root {
            --bg: #f3f6fb;
            --bg-accent:
                radial-gradient(circle at top left, rgba(54, 109, 255, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(17, 153, 142, 0.14), transparent 24%),
                linear-gradient(180deg, #f7f9fc 0%, #eef3f8 100%);
            --card: rgba(255, 255, 255, 0.92);
            --card-border: rgba(15, 23, 42, 0.08);
            --text: #152033;
            --muted: #64748b;
            --shadow: 0 20px 45px rgba(15, 23, 42, 0.10);
            --line: rgba(148, 163, 184, 0.16);
            --success-bg: rgba(20, 184, 121, 0.16);
            --success-text: #0f8a5f;
            --warning-bg: rgba(245, 158, 11, 0.18);
            --warning-text: #b45309;
            --neutral-bg: rgba(148, 163, 184, 0.16);
            --neutral-text: #475569;
            --blue: #1d4ed8;
            --danger: #dc2626;
            --terminal-text: #d7f9da;
            --terminal-muted: #93a5b6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Bahnschrift", "Segoe UI", sans-serif;
            color: var(--text);
            background: var(--bg);
            background-image: var(--bg-accent);
        }

        .page-shell {
            max-width: 1480px;
            margin: 0 auto;
            padding: 28px 20px 40px;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 22px;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(28px, 4vw, 42px);
            line-height: 1.04;
            letter-spacing: 0.02em;
        }

        .hero p {
            margin: 10px 0 0;
            max-width: 820px;
            color: var(--muted);
            font-size: 15px;
        }

        .signal-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid var(--card-border);
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
            color: var(--muted);
            font-size: 13px;
        }

        .signal-pill span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f59e0b;
            box-shadow: 0 0 0 5px rgba(245, 158, 11, 0.14);
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            padding: 22px 22px 16px;
        }

        .card-header h2,
        .card-header h3 {
            margin: 0;
            font-size: 20px;
        }

        .card-header p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .header-actions {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .selected-toolbar {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .selected-label {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .selected-toolbar .action-button {
            width: auto;
            min-width: 72px;
        }

        .table-wrap {
            padding: 0 18px 18px;
            overflow-x: auto;
        }

        .monitor-table {
            width: 100%;
            min-width: 720px;
            table-layout: fixed;
            border-collapse: collapse;
        }

        .col-process {
            width: auto;
        }

        .col-pid {
            width: 80px;
        }

        .col-cpu {
            width: 80px;
        }

        .col-memory {
            width: 100px;
        }

        .col-status {
            width: 100px;
        }

        th,
        td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: middle;
        }

        th {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .monitor-table tbody tr {
            cursor: pointer;
        }

        .monitor-table tbody tr.selected-row td {
            background: rgba(37, 99, 235, 0.08);
            box-shadow: inset 3px 0 0 var(--primary);
        }

        .metric,
        .mono {
            font-family: "Cascadia Mono", "Consolas", monospace;
            white-space: nowrap;
        }

        .process-name {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .process-name strong {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .process-id,
        .process-summary {
            color: var(--muted);
            font-size: 11px;
            line-height: 1.3;
        }

        .process-id {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .process-summary {
            font-family: "Cascadia Mono", "Consolas", monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: 80px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .status-badge::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.85;
        }

        .status-running {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .status-stopped {
            background: var(--neutral-bg);
            color: var(--neutral-text);
        }

        .status-recovering {
            background: var(--warning-bg);
            color: var(--warning-text);
        }

        .status-broken {
            background: rgba(99, 102, 241, 0.18);
            color: #4338ca;
        }

        .monitor-table tbody tr.drag-over td {
            background: rgba(37, 99, 235, 0.08);
            box-shadow: inset 0 1px 0 rgba(37, 99, 235, 0.16), inset 0 -1px 0 rgba(37, 99, 235, 0.16);
        }

        .update-file-name {
            margin: 0 0 14px;
            color: var(--muted);
            font-family: "Cascadia Mono", "Consolas", monospace;
            font-size: 13px;
            word-break: break-all;
        }

        .history-list {
            height: 100%;
            overflow: auto;
        }

        .snapshot-table {
            width: 100%;
            min-width: 1040px;
            border-collapse: collapse;
        }

        .snapshot-table th,
        .snapshot-table td {
            padding: 10px 8px;
            font-size: 12px;
            vertical-align: top;
        }

        .snapshot-path {
            max-width: 280px;
            color: var(--muted);
            font-family: "Cascadia Mono", "Consolas", monospace;
            overflow-wrap: anywhere;
        }

        .snapshot-remark {
            max-width: 240px;
            color: var(--text);
            line-height: 1.45;
            overflow-wrap: anywhere;
        }

        .current-snapshot {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 76px;
            padding: 5px 9px;
            border-radius: 999px;
            background: var(--success-bg);
            color: var(--success-text);
            font-size: 11px;
            font-weight: 700;
        }

        .snapshot-actions {
            display: inline-flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .snapshot-action {
            min-width: 82px;
            padding: 7px 10px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
        }

        .action-button {
            width: 100%;
            min-width: 72px;
            white-space: nowrap;
        }

        .btn-primary {
            color: white;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
        }

        .btn-success {
            color: white;
            background: linear-gradient(135deg, #16a34a, #15803d);
            box-shadow: 0 12px 24px rgba(22, 163, 74, 0.22);
        }

        .btn-danger {
            color: white;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 12px 24px rgba(220, 38, 38, 0.22);
        }

        .btn-secondary {
            color: var(--text);
            background: rgba(226, 232, 240, 0.9);
        }

        .btn-ghost {
            color: var(--blue);
            background: rgba(59, 130, 246, 0.10);
        }

        .empty-state {
            padding: 28px 16px;
            text-align: center;
            color: var(--muted);
        }

        .toast {
            position: fixed;
            top: 22px;
            right: 22px;
            min-width: 240px;
            max-width: 360px;
            padding: 14px 16px;
            border-radius: 18px;
            color: white;
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.18);
            opacity: 0;
            transform: translateY(-12px);
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 1200;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            background: linear-gradient(135deg, #059669, #047857);
        }

        .toast.error {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
        }

        .toast.info {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }

        .tool-alert {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin: 0 0 18px;
            padding: 14px 16px;
            border: 1px solid rgba(245, 158, 11, 0.26);
            border-radius: 16px;
            background: rgba(255, 251, 235, 0.96);
            color: #92400e;
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.08);
        }

        .tool-alert strong {
            display: block;
            margin-bottom: 4px;
            color: #78350f;
            font-size: 14px;
        }

        .tool-alert span {
            font-size: 13px;
            line-height: 1.4;
        }

        .tool-alert button {
            flex-shrink: 0;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.5);
            backdrop-filter: blur(6px);
            z-index: 1000;
        }

        .modal-card {
            display: none;
            position: fixed;
            z-index: 1100;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid var(--card-border);
            box-shadow: 0 30px 80px rgba(2, 6, 23, 0.42);
            backdrop-filter: blur(14px);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            padding: 20px 22px 16px;
            border-bottom: 1px solid var(--line);
        }

        .modal-header h3 {
            margin: 0;
            font-size: 20px;
        }

        .modal-header p {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .modal-close {
            padding: 10px 12px;
            background: rgba(148, 163, 184, 0.12);
            color: var(--text);
        }

        .config-modal {
            top: 50%;
            left: 50%;
            width: min(640px, calc(100vw - 28px));
            max-height: calc(100vh - 32px);
            transform: translate(-50%, -50%);
        }

        .history-modal {
            top: 16px;
            left: 16px;
            width: calc(100vw - 32px);
            height: calc(100vh - 32px);
            min-width: min(720px, calc(100vw - 28px));
            min-height: min(460px, calc(100vh - 28px));
            resize: both;
            display: none;
            flex-direction: column;
        }

        .history-modal .modal-header {
            cursor: move;
            user-select: none;
        }

        .history-modal .modal-header button {
            cursor: pointer;
        }

        .history-modal-body {
            flex: 1;
            min-height: 0;
            padding: 18px 20px 20px;
            overflow: hidden;
        }

        .config-modal-body {
            padding: 20px 22px 22px;
            overflow-y: auto;
            max-height: calc(100vh - 120px);
        }

        .config-modal-note {
            margin: 0 0 16px;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(59, 130, 246, 0.09);
            color: #1d4ed8;
            font-size: 13px;
        }

        form {
            display: grid;
            gap: 14px;
        }

        .field-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field label {
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
        }

        .field input {
            width: 100%;
            border: 1px solid rgba(148, 163, 184, 0.32);
            border-radius: 14px;
            padding: 12px 14px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.86);
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .field input:focus {
            border-color: rgba(37, 99, 235, 0.5);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
        }

        .field input:disabled {
            background: rgba(226, 232, 240, 0.54);
            color: var(--muted);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding-top: 4px;
        }

        .terminal-modal {
            inset: 6vh 6vw;
            background: rgba(18, 24, 34, 0.98);
            border: 1px solid rgba(148, 163, 184, 0.22);
        }

        .terminal-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(13, 17, 23, 0.96);
        }

        .terminal-dots {
            display: inline-flex;
            gap: 8px;
        }

        .terminal-dots span {
            width: 11px;
            height: 11px;
            border-radius: 50%;
        }

        .terminal-dots span:nth-child(1) { background: #ff5f57; }
        .terminal-dots span:nth-child(2) { background: #febc2e; }
        .terminal-dots span:nth-child(3) { background: #28c840; }

        .terminal-heading {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .terminal-heading strong {
            color: white;
            font-size: 15px;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        .terminal-heading small {
            color: var(--terminal-muted);
            font-size: 12px;
        }

        .terminal-close {
            padding: 10px 12px;
            background: rgba(148, 163, 184, 0.12);
            color: #f8fafc;
        }

        .terminal-body {
            height: calc(100% - 68px);
            padding: 18px;
            background:
                linear-gradient(rgba(148, 163, 184, 0.04) 1px, transparent 1px) 0 0 / 100% 32px,
                linear-gradient(90deg, rgba(148, 163, 184, 0.03) 1px, transparent 1px) 0 0 / 32px 100%,
                linear-gradient(180deg, rgba(13, 17, 23, 1) 0%, rgba(9, 14, 21, 1) 100%);
        }

        .terminal-frame {
            height: 100%;
            border: 1px solid rgba(148, 163, 184, 0.14);
            border-radius: 18px;
            overflow: hidden;
            background: rgba(4, 8, 15, 0.72);
            display: flex;
            flex-direction: column;
        }

        .terminal-query {
            display: grid;
            grid-template-columns: repeat(2, minmax(150px, 1fr)) minmax(120px, 0.8fr) minmax(180px, 1.2fr) repeat(5, auto);
            gap: 10px;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.14);
            background: rgba(15, 23, 42, 0.62);
        }

        .terminal-query input,
        .terminal-query select {
            min-width: 0;
            border: 1px solid rgba(148, 163, 184, 0.26);
            border-radius: 10px;
            padding: 9px 10px;
            color: #f8fafc;
            background: rgba(15, 23, 42, 0.9);
            font-family: inherit;
            font-size: 12px;
            outline: none;
        }

        .terminal-query button {
            white-space: nowrap;
        }

        .terminal-pager {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 14px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.14);
            color: var(--terminal-muted);
            background: rgba(15, 23, 42, 0.42);
            font-family: "Cascadia Mono", "Consolas", monospace;
            font-size: 12px;
        }

        .terminal-tail-state {
            color: #86efac;
            white-space: nowrap;
        }

        .terminal-tail-state.paused {
            color: #fbbf24;
        }

        .terminal-label {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.14);
            color: var(--terminal-muted);
            font-family: "Cascadia Mono", "Consolas", monospace;
            font-size: 12px;
        }

        .terminal-console {
            flex: 1;
            padding: 12px 0 16px;
            overflow: auto;
            color: var(--terminal-text);
            font-family: "Cascadia Mono", "Consolas", monospace;
            font-size: 12px;
            line-height: 1.55;
            background:
                linear-gradient(180deg, rgba(2, 6, 23, 0.18), rgba(2, 6, 23, 0)),
                rgba(2, 6, 23, 0.34);
        }

        .terminal-line {
            display: grid;
            grid-template-columns: 54px 82px 64px minmax(0, 1fr);
            gap: 12px;
            align-items: start;
            min-height: 24px;
            padding: 3px 16px;
            border-left: 3px solid transparent;
        }

        .terminal-line:nth-child(even) {
            background: rgba(148, 163, 184, 0.025);
        }

        .terminal-line:hover {
            background: rgba(59, 130, 246, 0.08);
        }

        .terminal-line.error {
            border-left-color: #ef4444;
            background: rgba(127, 29, 29, 0.16);
        }

        .terminal-line.info {
            border-left-color: rgba(34, 197, 94, 0.42);
        }

        .terminal-line.system {
            border-left-color: rgba(59, 130, 246, 0.55);
            color: #bfdbfe;
        }

        .terminal-index {
            color: #475569;
            text-align: right;
            user-select: none;
        }

        .terminal-time {
            color: #93a4b8;
            white-space: nowrap;
        }

        .terminal-level {
            width: fit-content;
            min-width: 48px;
            padding: 1px 7px;
            border-radius: 999px;
            color: #bbf7d0;
            background: rgba(22, 163, 74, 0.18);
            font-size: 11px;
            font-weight: 800;
            text-align: center;
            letter-spacing: 0.04em;
        }

        .terminal-line.error .terminal-level {
            color: #fecaca;
            background: rgba(220, 38, 38, 0.24);
        }

        .terminal-line.system .terminal-level {
            color: #bfdbfe;
            background: rgba(37, 99, 235, 0.22);
        }

        .terminal-message {
            min-width: 0;
            color: #d7f9da;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .terminal-line.error .terminal-message {
            color: #fecaca;
        }

        .terminal-line.system .terminal-message {
            color: #bfdbfe;
        }

        @media (max-width: 960px) {
            .card-header,
            .hero,
            .tool-alert {
                flex-direction: column;
                align-items: stretch;
            }
        }

        @media (max-width: 720px) {
            .page-shell {
                padding: 20px 14px 30px;
            }

            .field-grid {
                grid-template-columns: 1fr;
            }

            .terminal-query {
                grid-template-columns: 1fr;
            }

            .terminal-pager {
                align-items: flex-start;
                flex-direction: column;
            }

            .card-header,
            .modal-header,
            .config-modal-body {
                padding-left: 18px;
                padding-right: 18px;
            }

            .terminal-modal {
                inset: 2vh 2vw;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <section class="hero">
            <div>
            </div>
            <div class="signal-pill" id="connectionState">
                <span></span>
                <strong>连接中</strong>
            </div>
        </section>

        <section class="tool-alert" id="sevenZipAlert">
            <div>
                <strong>未检测到 7-Zip</strong>
                <span id="sevenZipMessage">更新 .zip / .rar 包需要 7-Zip。</span>
            </div>
            <button type="button" class="btn-primary" id="installSevenZipButton">一键安装 7z</button>
        </section>

        <article class="card">
            <div class="card-header">
                <div>
                    <h2>进程监控</h2>
                </div>
                <div class="header-actions">
                    <div class="selected-toolbar" aria-live="polite">
                        <span class="selected-label" id="selectedProcessLabel">请选择一个进程</span>
                        <button type="button" class="action-button btn-secondary" id="toolbarTerminalButton" disabled>终端</button>
                        <button type="button" class="action-button btn-success" id="toolbarToggleButton" disabled>启动</button>
                        <button type="button" class="action-button btn-secondary" id="toolbarHistoryButton" disabled>历史</button>
                        <button type="button" class="action-button btn-ghost" id="toolbarBackupButton" disabled>备份</button>
                        <button type="button" class="action-button btn-ghost" id="toolbarEditButton" disabled>编辑</button>
                        <button type="button" class="action-button btn-secondary" id="toolbarDeleteButton" disabled>删除</button>
                    </div>
                    <button type="button" class="btn-primary" id="openConfigButton">新增进程</button>
                </div>
            </div>
            <div class="table-wrap">
                <table class="monitor-table">
                    <colgroup>
                        <col class="col-process">
                        <col class="col-pid">
                        <col class="col-cpu">
                        <col class="col-memory">
                        <col class="col-status">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>进程</th>
                            <th>PID</th>
                            <th>CPU</th>
                            <th>内存</th>
                            <th>状态</th>
                        </tr>

                    <tbody id="statusTableBody"></tbody>

        </article>
    </div>

    <div class="toast" id="toast"></div>
    <div class="overlay" id="overlay"></div>

    <section class="modal-card config-modal" id="configModal">
        <div class="modal-header">
            <div>
                <h3 id="formTitle">新增进程</h3>
                <p id="formSubtitle">填写基础配置后保存。编辑模式下 ID 固定不可改。</p>
            </div>
            <button class="modal-close" type="button" id="closeConfigButton">关闭</button>
        </div>
        <div class="config-modal-body">
            <p class="config-modal-note">配置保存后不会自动启动进程。正在运行的进程若修改了配置，需要手动停止后重新启动才会按新配置生效。</p>
            <form id="configForm">
                <div class="field-grid">
                    <div class="field">
                        <label for="processId">ID</label>
                        <input id="processId" name="id" placeholder="例如：webapp01" required>
                    </div>
                    <div class="field">
                        <label for="processName">名称</label>
                        <input id="processName" name="name" placeholder="例如：webapp01" required>
                    </div>
                </div>

                <div class="field">
                    <label for="dllPath">程序路径</label>
                    <input id="dllPath" name="dllPath" placeholder="例如：/home/ichinesebulbul/webapp/WebApplication1.dll 或 /home/ichinesebulbul/webapp/WebApplication1" required>
                </div>

                <div class="field">
                    <label for="arguments">启动参数</label>
                    <input id="arguments" name="arguments" placeholder="例如：--port 5001">
                </div>

                <div class="field">
                    <label for="startupDelayMs">启动延迟（毫秒）</label>
                    <input id="startupDelayMs" name="startupDelayMs" type="number" min="0" step="100" value="5000" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="saveButton">保存配置</button>
                    <button type="button" class="btn-secondary" id="resetButton">重置表单</button>
                </div>
            </form>
        </div>
    </section>

    <section class="modal-card config-modal" id="updateModal">
        <div class="modal-header">
            <div>
                <h3 id="updateTitle">上传更新包</h3>
                <p id="updateSubtitle">更新前会自动备份目标目录，成功后会重启进程。</p>
            </div>
            <button class="modal-close" type="button" id="closeUpdateButton">关闭</button>
        </div>
        <div class="config-modal-body">
            <p class="update-file-name" id="updateFileName"></p>
            <form id="updateForm">
                <div class="field">
                    <label for="updatePassword">压缩包密码</label>
                    <input id="updatePassword" name="password" type="password" placeholder="无密码可留空">
                </div>
                <div class="field">
                    <label for="updateRemark">备注</label>
                    <input id="updateRemark" name="remark" maxlength="200" placeholder="例如：修复登录超时问题">
                </div>
                <div class="form-actions">
                    <button class="btn-primary" type="submit" id="uploadUpdateButton">开始更新</button>
                    <button class="btn-secondary" type="button" id="cancelUpdateButton">取消</button>
                </div>
            </form>
        </div>
    </section>

    <section class="modal-card history-modal" id="historyModal">
        <div class="modal-header">
            <div>
                <h3 id="historyTitle">历史备份</h3>
                <p id="historySubtitle">展示该进程的版本快照和当前版本。</p>
            </div>
            <button class="modal-close" type="button" id="closeHistoryButton">关闭</button>
        </div>
        <div class="history-modal-body">
            <div class="history-list" id="historyList"></div>
        </div>
    </section>

    <section class="modal-card terminal-modal" id="terminalModal">
        <div class="terminal-topbar">
            <div class="terminal-dots" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="terminal-heading">
                <strong id="terminalTitle">终端日志</strong>
                <small id="terminalMeta">等待选择进程...</small>
            </div>
            <button class="terminal-close" type="button" id="closeTerminalButton">关闭</button>
        </div>
        <div class="terminal-body">
            <div class="terminal-frame">
                <div class="terminal-label" id="terminalLabel">$ tail -f logs/process.log</div>
                <div class="terminal-query">
                    <input id="logFrom" type="datetime-local" aria-label="开始时间">
                    <input id="logTo" type="datetime-local" aria-label="结束时间">
                    <select id="logLevel" aria-label="日志级别">
                        <option value="">全部级别</option>
                        <option value="Info">Info</option>
                        <option value="Error">Error</option>
                    </select>
                    <input id="logKeyword" type="search" placeholder="关键字" aria-label="日志关键字">
                    <button type="button" class="btn-ghost" id="queryLogsButton">查询</button>
                    <button type="button" class="btn-secondary" id="loadMoreLogsButton">加载更早</button>
                    <button type="button" class="btn-ghost" id="latestLogsButton">回到最新</button>
                    <button type="button" class="btn-secondary" id="exportLogsButton">导出日志</button>
                    <button type="button" class="btn-danger" id="deleteLogsButton">删除日志</button>
                </div>
                <div class="terminal-pager">
                    <span id="logPageStatus">第 1 页 / 共 0 条</span>
                    <span class="terminal-tail-state" id="logTailState">实时尾随</span>
                </div>
                <div class="terminal-console" id="logConsole" role="log" aria-live="polite"></div>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script>
        const state = {
            configs: [],
            statuses: new Map(),
            rowRefs: new Map(),
            selectedId: null,
            editingId: null,
            currentLogId: null,
            logPage: 1,
            logPageSize: 200,
            logTotal: 0,
            logFollowingLatest: true,
            pendingUpdate: null,
            activeModal: null,
            historyDrag: null
        };

        const elements = {
            statusTableBody: document.getElementById("statusTableBody"),
            configForm: document.getElementById("configForm"),
            processId: document.getElementById("processId"),
            processName: document.getElementById("processName"),
            dllPath: document.getElementById("dllPath"),
            arguments: document.getElementById("arguments"),
            startupDelayMs: document.getElementById("startupDelayMs"),
            formTitle: document.getElementById("formTitle"),
            formSubtitle: document.getElementById("formSubtitle"),
            saveButton: document.getElementById("saveButton"),
            resetButton: document.getElementById("resetButton"),
            openConfigButton: document.getElementById("openConfigButton"),
            selectedProcessLabel: document.getElementById("selectedProcessLabel"),
            toolbarTerminalButton: document.getElementById("toolbarTerminalButton"),
            toolbarToggleButton: document.getElementById("toolbarToggleButton"),
            toolbarHistoryButton: document.getElementById("toolbarHistoryButton"),
            toolbarBackupButton: document.getElementById("toolbarBackupButton"),
            toolbarEditButton: document.getElementById("toolbarEditButton"),
            toolbarDeleteButton: document.getElementById("toolbarDeleteButton"),
            closeConfigButton: document.getElementById("closeConfigButton"),
            toast: document.getElementById("toast"),
            connectionState: document.getElementById("connectionState"),
            sevenZipAlert: document.getElementById("sevenZipAlert"),
            sevenZipMessage: document.getElementById("sevenZipMessage"),
            installSevenZipButton: document.getElementById("installSevenZipButton"),
            overlay: document.getElementById("overlay"),
            configModal: document.getElementById("configModal"),
            terminalModal: document.getElementById("terminalModal"),
            terminalTitle: document.getElementById("terminalTitle"),
            terminalMeta: document.getElementById("terminalMeta"),
            terminalLabel: document.getElementById("terminalLabel"),
            logConsole: document.getElementById("logConsole"),
            logFrom: document.getElementById("logFrom"),
            logTo: document.getElementById("logTo"),
            logLevel: document.getElementById("logLevel"),
            logKeyword: document.getElementById("logKeyword"),
            queryLogsButton: document.getElementById("queryLogsButton"),
            loadMoreLogsButton: document.getElementById("loadMoreLogsButton"),
            latestLogsButton: document.getElementById("latestLogsButton"),
            exportLogsButton: document.getElementById("exportLogsButton"),
            deleteLogsButton: document.getElementById("deleteLogsButton"),
            logPageStatus: document.getElementById("logPageStatus"),
            logTailState: document.getElementById("logTailState"),
            closeTerminalButton: document.getElementById("closeTerminalButton"),
            updateModal: document.getElementById("updateModal"),
            updateForm: document.getElementById("updateForm"),
            updateTitle: document.getElementById("updateTitle"),
            updateSubtitle: document.getElementById("updateSubtitle"),
            updateFileName: document.getElementById("updateFileName"),
            updatePassword: document.getElementById("updatePassword"),
            updateRemark: document.getElementById("updateRemark"),
            uploadUpdateButton: document.getElementById("uploadUpdateButton"),
            closeUpdateButton: document.getElementById("closeUpdateButton"),
            cancelUpdateButton: document.getElementById("cancelUpdateButton"),
            historyModal: document.getElementById("historyModal"),
            historyTitle: document.getElementById("historyTitle"),
            historySubtitle: document.getElementById("historySubtitle"),
            historyList: document.getElementById("historyList"),
            closeHistoryButton: document.getElementById("closeHistoryButton")
        };

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/monitor")
            .withAutomaticReconnect()
            .build();

        connection.on("ReceiveStatuses", processes => {
            state.statuses = new Map(processes.map(process => [process.id, process]));
            updateAllStatusRows();
            refreshTerminalMeta();
        });

        connection.on("ReceiveHistoryLogs", (id, logs) => {
            if (state.currentLogId !== id) {
                return;
            }

            clearLogConsole();
            if (logs.length > 0) {
                appendLogLines(logs.map(parseRealtimeLogLine));
            } else {
                appendSystemLogLine("日志缓冲区为空");
            }
            scrollTerminalToBottom();
        });

        connection.on("ReceiveLog", (id, logText) => {
            if (state.currentLogId !== id) {
                return;
            }

            const shouldFollow = state.logFollowingLatest && isTerminalNearBottom();
            appendLogLine(parseRealtimeLogLine(logText));
            if (shouldFollow) {
                scrollTerminalToBottom();
            } else if (state.logPage === 1) {
                state.logFollowingLatest = false;
            }
            updateLogPagerState();
        });

        connection.onreconnecting(() => setConnectionState("重连中", "#f59e0b"));
        connection.onreconnected(() => setConnectionState("已连接", "#16a34a"));
        connection.onclose(() => setConnectionState("已断开", "#dc2626"));

        elements.configForm.addEventListener("submit", saveProcessConfig);
        elements.resetButton.addEventListener("click", resetForm);
        elements.openConfigButton.addEventListener("click", () => openConfigModal());
        elements.toolbarTerminalButton.addEventListener("click", () => {
            const config = getSelectedConfig();
            if (config) {
                openTerminal(config.id);
            }
        });
        elements.toolbarToggleButton.addEventListener("click", () => {
            const config = getSelectedConfig();
            if (config) {
                toggleProcess(config.id);
            }
        });
        elements.toolbarHistoryButton.addEventListener("click", () => {
            const config = getSelectedConfig();
            if (config) {
                openHistoryModal(config);
            }
        });
        elements.toolbarBackupButton.addEventListener("click", () => {
            const config = getSelectedConfig();
            if (config) {
                createManualSnapshot(config);
            }
        });
        elements.toolbarEditButton.addEventListener("click", () => {
            const config = getSelectedConfig();
            if (config) {
                openConfigModal(config);
            }
        });
        elements.toolbarDeleteButton.addEventListener("click", () => {
            const config = getSelectedConfig();
            if (config) {
                deleteProcess(config);
            }
        });
        elements.closeConfigButton.addEventListener("click", closeConfigModal);
        elements.closeTerminalButton.addEventListener("click", () => closeActiveModal());
        elements.queryLogsButton.addEventListener("click", () => queryPersistedLogs(1));
        elements.loadMoreLogsButton.addEventListener("click", () => queryPersistedLogs(state.logPage + 1, true));
        elements.latestLogsButton.addEventListener("click", () => queryPersistedLogs(1));
        elements.exportLogsButton.addEventListener("click", exportLogs);
        elements.deleteLogsButton.addEventListener("click", deleteLogs);
        elements.logConsole.addEventListener("scroll", handleTerminalScroll);
        elements.updateForm.addEventListener("submit", uploadUpdatePackage);
        elements.closeUpdateButton.addEventListener("click", closeUpdateModal);
        elements.cancelUpdateButton.addEventListener("click", closeUpdateModal);
        elements.closeHistoryButton.addEventListener("click", closeHistoryModal);
        elements.installSevenZipButton.addEventListener("click", installSevenZip);
        elements.historyModal.querySelector(".modal-header").addEventListener("mousedown", startHistoryDrag);
        document.addEventListener("mousemove", dragHistoryModal);
        document.addEventListener("mouseup", stopHistoryDrag);
        window.addEventListener("resize", keepHistoryModalInViewport);
        elements.overlay.addEventListener("click", () => closeActiveModal());
        document.addEventListener("keydown", event => {
            if (event.key === "Escape") {
                closeActiveModal();
            }
        });

        initialize();

        async function initialize() {
            setConnectionState("连接中", "#f59e0b");
            await Promise.all([startSignalR(), loadConfigs(), checkSevenZipStatus()]);
            rebuildStatusRows();
            updateAllStatusRows();
        }

        async function startSignalR() {
            try {
                await connection.start();
                setConnectionState("已连接", "#16a34a");
            } catch (error) {
                console.error(error);
                setConnectionState("连接失败", "#dc2626");
                showToast("SignalR 连接失败，请刷新页面重试。", "error");
            }
        }

        async function loadConfigs() {
            try {
                const response = await fetch("/api/processes");
                if (!response.ok) {
                    throw new Error(await readMessage(response, "加载配置失败。"));
                }

                state.configs = await response.json();
                if (state.selectedId && !state.configs.some(item => item.id === state.selectedId)) {
                    state.selectedId = null;
                }
                rebuildStatusRows();
                updateAllStatusRows();
                refreshTerminalMeta();
            } catch (error) {
                console.error(error);
                showToast(error.message, "error");
            }
        }

        async function checkSevenZipStatus() {
            try {
                const response = await fetch("/api/tools/7zip");
                const status = await response.json();
                renderSevenZipStatus(status);
            } catch (error) {
                console.error(error);
                elements.sevenZipAlert.style.display = "flex";
                elements.sevenZipMessage.textContent = "检测 7-Zip 状态失败，请确认后端服务正常运行。";
                elements.installSevenZipButton.style.display = "none";
            }
        }

        function renderSevenZipStatus(status) {
            if (status.installed) {
                elements.sevenZipAlert.style.display = "none";
                elements.installSevenZipButton.disabled = false;
                elements.installSevenZipButton.textContent = "一键安装 7z";
                return;
            }

            elements.sevenZipAlert.style.display = "flex";
            elements.sevenZipMessage.textContent = status.message || "未检测到 7-Zip，更新 .zip / .rar 包前需要先安装。";
            elements.installSevenZipButton.style.display = status.packageFound ? "" : "none";
            elements.installSevenZipButton.disabled = false;
            elements.installSevenZipButton.textContent = "一键安装 7z";
        }

        async function installSevenZip() {
            elements.installSevenZipButton.disabled = true;
            elements.installSevenZipButton.textContent = "安装中...";

            try {
                const response = await fetch("/api/tools/7zip/install", {
                    method: "POST"
                });
                const status = await response.json();
                renderSevenZipStatus(status);

                if (!response.ok || !status.installed) {
                    throw new Error(status.message || "7-Zip 安装失败。");
                }

                showToast(status.message || "7-Zip 已安装完成。", "success");
            } catch (error) {
                console.error(error);
                showToast(error.message, "error");
                elements.installSevenZipButton.disabled = false;
                elements.installSevenZipButton.textContent = "一键安装 7z";
            }
        }

        function rebuildStatusRows() {
            elements.statusTableBody.replaceChildren();
            state.rowRefs.clear();

            if (state.configs.length === 0) {
                state.selectedId = null;
                elements.statusTableBody.appendChild(createEmptyRow("当前还没有配置任何进程。", 5));
                updateToolbar();
                return;
            }

            for (const config of state.configs) {
                const row = document.createElement("tr");
                row.id = `row-${config.id}`;
                row.classList.toggle("selected-row", config.id === state.selectedId);
                row.addEventListener("click", () => selectProcess(config.id));
                wireUpdateDrop(row, config);

                const nameCell = document.createElement("td");
                const nameWrap = document.createElement("div");
                nameWrap.className = "process-name";

                const nameStrong = document.createElement("strong");
                nameStrong.textContent = config.name;

                const idLine = document.createElement("small");
                idLine.className = "process-id";
                idLine.textContent = config.id;

                const summaryLine = document.createElement("small");
                summaryLine.className = "process-summary";
                summaryLine.textContent = buildSummary(config);
                summaryLine.title = buildSummary(config);

                nameWrap.appendChild(nameStrong);
                nameWrap.appendChild(idLine);
                nameWrap.appendChild(summaryLine);
                nameCell.appendChild(nameWrap);

                const pidCell = createTextCell("-", "mono");
                const cpuCell = createTextCell("-", "metric");
                const memoryCell = createTextCell("-", "metric");

                const statusCell = document.createElement("td");
                const statusBadge = document.createElement("span");
                statusBadge.className = "status-badge status-stopped";
                statusBadge.textContent = "已停止";
                statusCell.appendChild(statusBadge);

                row.append(nameCell, pidCell, cpuCell, memoryCell, statusCell);
                elements.statusTableBody.appendChild(row);

                state.rowRefs.set(config.id, {
                    row,
                    nameStrong,
                    idLine,
                    summaryLine,
                    pidCell,
                    cpuCell,
                    memoryCell,
                    statusBadge
                });
            }

            updateToolbar();
        }

        function updateAllStatusRows() {
            if (state.configs.length === 0) {
                updateToolbar();
                return;
            }

            for (const config of state.configs) {
                updateStatusRow(config.id);
            }

            updateToolbar();
        }

        function updateStatusRow(id) {
            const config = state.configs.find(item => item.id === id);
            const refs = state.rowRefs.get(id);

            if (!config || !refs) {
                return;
            }

            const process = state.statuses.get(id) ?? createStatusFallback(config);
            const summary = buildSummary(config);
            const statusMeta = getStatusMeta(process);

            refs.nameStrong.textContent = config.name;
            refs.idLine.textContent = config.id;
            refs.summaryLine.textContent = summary;
            refs.summaryLine.title = summary;
            refs.pidCell.textContent = process.pid ?? "-";
            refs.cpuCell.textContent = process.isRunning ? `${process.cpuUsage.toFixed(1)}%` : "-";
            refs.memoryCell.textContent = process.isRunning ? `${process.memoryMb.toFixed(1)} MB` : "-";
            refs.statusBadge.className = `status-badge ${statusMeta.className}`;
            refs.statusBadge.textContent = statusMeta.label;
        }

        function selectProcess(id) {
            state.selectedId = id;

            for (const [rowId, refs] of state.rowRefs) {
                refs.row.classList.toggle("selected-row", rowId === id);
            }

            updateToolbar();
        }

        function getSelectedConfig() {
            return state.configs.find(item => item.id === state.selectedId) ?? null;
        }

        function getSelectedStatus() {
            const config = getSelectedConfig();
            if (!config) {
                return null;
            }

            return state.statuses.get(config.id) ?? createStatusFallback(config);
        }

        function updateToolbar() {
            const config = getSelectedConfig();
            const process = getSelectedStatus();
            const hasSelection = config !== null;
            const buttons = [
                elements.toolbarTerminalButton,
                elements.toolbarToggleButton,
                elements.toolbarHistoryButton,
                elements.toolbarBackupButton,
                elements.toolbarEditButton,
                elements.toolbarDeleteButton
            ];

            for (const button of buttons) {
                button.disabled = !hasSelection;
            }

            if (!hasSelection) {
                elements.selectedProcessLabel.textContent = "请选择一个进程";
                elements.toolbarToggleButton.textContent = "启动";
                elements.toolbarToggleButton.className = "action-button btn-success";
                return;
            }

            elements.selectedProcessLabel.textContent = `已选：${config.name} / ${config.id}`;
            elements.toolbarToggleButton.textContent = process?.isRunning ? "停止" : "启动";
            elements.toolbarToggleButton.className = `action-button ${process?.isRunning ? "btn-danger" : "btn-success"}`;
        }

        function buildSummary(config) {
            return `${config.dllPath} · 延迟 ${config.startupDelayMs} ms`;
        }

        function createStatusFallback(config) {
            return {
                id: config.id,
                name: config.name,
                pid: null,
                isRunning: false,
                isManuallyStopped: true,
                isCircuitBroken: false,
                cpuUsage: 0,
                memoryMb: 0
            };
        }

        function createActionButton(label, className) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = `action-button ${className}`;
            button.textContent = label;
            return button;
        }

        function wireUpdateDrop(row, config) {
            row.addEventListener("dragover", event => {
                if (!event.dataTransfer || event.dataTransfer.types.includes("Files") === false) {
                    return;
                }

                event.preventDefault();
                row.classList.add("drag-over");
            });

            row.addEventListener("dragleave", event => {
                if (!row.contains(event.relatedTarget)) {
                    row.classList.remove("drag-over");
                }
            });

            row.addEventListener("drop", event => {
                event.preventDefault();
                row.classList.remove("drag-over");

                const file = event.dataTransfer?.files?.[0];
                if (!file) {
                    return;
                }

                if (!isSupportedUpdatePackage(file.name)) {
                    showToast("仅支持 .zip 或 .rar 更新包。", "error");
                    return;
                }

                openUpdateModal(config, file);
            });
        }

        function isSupportedUpdatePackage(fileName) {
            return /\.(zip|rar)$/i.test(fileName);
        }

        async function openUpdateModal(config, file) {
            await closeActiveModal();

            state.pendingUpdate = { config, file };
            elements.updatePassword.value = "";
            elements.updateRemark.value = "";
            elements.updateTitle.textContent = `更新 ${config.name}`;
            elements.updateSubtitle.textContent = `目标目录：${getTargetDirectoryText(config.dllPath)}`;
            elements.updateFileName.textContent = `${file.name} · ${formatBytes(file.size)}`;
            elements.uploadUpdateButton.disabled = false;
            elements.uploadUpdateButton.textContent = "开始更新";
            showModal("update");
        }

        function closeUpdateModal() {
            if (state.activeModal !== "update") {
                return;
            }

            state.pendingUpdate = null;
            elements.updateForm.reset();
            hideModal();
        }

        async function uploadUpdatePackage(event) {
            event.preventDefault();

            if (!state.pendingUpdate) {
                return;
            }

            const { config, file } = state.pendingUpdate;
            const formData = new FormData();
            formData.append("file", file);
            formData.append("password", elements.updatePassword.value.trim());
            formData.append("remark", normalizeRemark(elements.updateRemark.value));

            elements.uploadUpdateButton.disabled = true;
            elements.uploadUpdateButton.textContent = "更新中...";

            try {
                const response = await fetch(`/api/processes/${encodeURIComponent(config.id)}/updates`, {
                    method: "POST",
                    body: formData
                });

                const message = await readMessage(response, "更新失败。");
                if (!response.ok) {
                    throw new Error(message);
                }

                showToast(message, "success");
                closeUpdateModal();
                await loadConfigs();
            } catch (error) {
                console.error(error);
                showToast(error.message, "error");
                elements.uploadUpdateButton.disabled = false;
                elements.uploadUpdateButton.textContent = "开始更新";
            }
        }

        async function createManualSnapshot(config) {

        function resetHistoryModalLayout() {
            state.historyDrag = null;
            elements.historyModal.style.left = "16px";
            elements.historyModal.style.top = "16px";
            elements.historyModal.style.width = "calc(100vw - 32px)";
            elements.historyModal.style.height = "calc(100vh - 32px)";
        }

        function clearHistoryModalInteraction() {
            state.historyDrag = null;
        }

        function startHistoryDrag(event) {
            if (state.activeModal !== "history" || event.target.closest("button")) {
                return;
            }

            const rect = elements.historyModal.getBoundingClientRect();
            state.historyDrag = {
                offsetX: event.clientX - rect.left,
                offsetY: event.clientY - rect.top
            };
            event.preventDefault();
        }

        function dragHistoryModal(event) {
            if (!state.historyDrag) {
                return;
            }

            const rect = elements.historyModal.getBoundingClientRect();
            const nextLeft = event.clientX - state.historyDrag.offsetX;
            const nextTop = event.clientY - state.historyDrag.offsetY;
            setHistoryModalPosition(nextLeft, nextTop, rect.width, rect.height);
        }

        function stopHistoryDrag() {
            state.historyDrag = null;
        }

        function keepHistoryModalInViewport() {
            if (state.activeModal !== "history") {
                return;
            }

            const rect = elements.historyModal.getBoundingClientRect();
            setHistoryModalPosition(rect.left, rect.top, rect.width, rect.height);
        }

        function setHistoryModalPosition(left, top, width, height) {
            const margin = 12;
            const maxLeft = Math.max(margin, window.innerWidth - width - margin);
            const maxTop = Math.max(margin, window.innerHeight - height - margin);
            const nextLeft = Math.min(Math.max(left, margin), maxLeft);
            const nextTop = Math.min(Math.max(top, margin), maxTop);
            elements.historyModal.style.left = `${nextLeft}px`;
            elements.historyModal.style.top = `${nextTop}px`;
        }

        function renderHistory(config, snapshots) {
            elements.historyList.replaceChildren();

            if (!snapshots || snapshots.length === 0) {
                elements.historyList.appendChild(createHistoryEmpty("暂无历史备份。拖拽更新包成功后会生成新的快照。"));
                return;
            }

            const table = document.createElement("table");
            table.className = "snapshot-table";
            const thead = document.createElement("thead");
            const headerRow = document.createElement("tr");
            for (const label of ["当前", "创建时间", "更新包", "备注", "大小", "目标目录", "快照目录", "状态", "操作"]) {
                const th = document.createElement("th");
                th.textContent = label;
                headerRow.appendChild(th);
            }
            thead.appendChild(headerRow);

            const tbody = document.createElement("tbody");
            for (const snapshot of snapshots) {
                const row = document.createElement("tr");
                row.appendChild(createSnapshotCell(snapshot.isCurrent ? createCurrentBadge() : "-"));
                row.appendChild(createSnapshotCell(formatDateTime(snapshot.createdAt)));
                row.appendChild(createSnapshotCell(snapshot.originalFileName || "-"));
                row.appendChild(createSnapshotRemarkCell(snapshot.remark));
                row.appendChild(createSnapshotCell(formatBytes(snapshot.fileSizeBytes)));
                row.appendChild(createSnapshotPathCell(snapshot.targetDirectory));
                row.appendChild(createSnapshotPathCell(snapshot.snapshotDirectory));
                row.appendChild(createSnapshotCell(getSnapshotStatusLabel(snapshot)));

                const actionCell = document.createElement("td");
                if (snapshot.isCurrent) {
                    actionCell.textContent = "当前版本";
                } else if (snapshot.status === "Succeeded" && snapshot.snapshotDirectory) {
                    const actions = document.createElement("div");
                    actions.className = "snapshot-actions";

                    const restoreButton = createActionButton("一键恢复", "btn-ghost");
                    restoreButton.classList.add("snapshot-action");
                    restoreButton.addEventListener("click", () => restoreSnapshot(config, snapshot));

                    const deleteButton = createActionButton("删除", "btn-secondary");
                    deleteButton.classList.add("snapshot-action");
                    deleteButton.addEventListener("click", () => deleteSnapshot(config, snapshot));

                    actions.append(restoreButton, deleteButton);
                    actionCell.appendChild(actions);
                } else {
                    actionCell.textContent = "-";
                }

                row.appendChild(actionCell);
                tbody.appendChild(row);
            }

            table.append(thead, tbody);
            elements.historyList.appendChild(table);
        }

        function createHistoryEmpty(message) {
            const empty = document.createElement("div");
            empty.className = "empty-state";
            empty.textContent = message;
            return empty;
        }

        function createSnapshotCell(content) {
            const cell = document.createElement("td");
            if (content instanceof Node) {
                cell.appendChild(content);
            } else {
                cell.textContent = String(content);
            }
            return cell;
        }

        function createSnapshotPathCell(value) {
            const cell = createSnapshotCell(value || "-");
            cell.className = "snapshot-path";
            cell.title = value || "";
            return cell;
        }

        function createSnapshotRemarkCell(value) {
            const remark = normalizeRemark(value);
            const cell = createSnapshotCell(remark || "-");
            cell.className = "snapshot-remark";
            cell.title = remark;
            return cell;
        }

        function createCurrentBadge() {

        async function restoreSnapshot(config, snapshot) {

        async function deleteSnapshot(config, snapshot) {
            const confirmed = window.confirm(`确定删除快照“${snapshot.originalFileName}”吗？这会永久删除备份目录：${snapshot.snapshotDirectory}，且不可恢复。`);
            if (!confirmed) {

            try {

                    method: "DELETE"
                });
                const message = await readMessage(response, "删除历史快照失败。");

        function getSnapshotStatusLabel(snapshot) {
            if (snapshot.errorMessage) {
                return snapshot.errorMessage;
            }

            if (snapshot.status === "Succeeded") {
                return "可恢复";
            }

            if (snapshot.status === "Running") {
                return "生成中";
            }

            return "不可用";
        }

        function getTargetDirectoryText(dllPath) {
            const normalized = dllPath.replaceAll("\\", "/");
            const index = normalized.lastIndexOf("/");
            return index >= 0 ? normalized.slice(0, index) : ".";
        }

        function normalizeRemark(value) {
            return String(value ?? "").trim().slice(0, 200);
        }

        function formatBytes(value) {
            if (!Number.isFinite(value)) {
                return "-";
            }

            if (value < 1024) {
                return `${value} B`;
            }

            if (value < 1024 * 1024) {
                return `${(value / 1024).toFixed(1)} KB`;
            }

            return `${(value / 1024 / 1024).toFixed(1)} MB`;
        }

        function formatDateTime(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return "-";
            }

            return date.toLocaleString();
        }

        function resetLogQueryState() {
            state.logPage = 1;
            state.logTotal = 0;
            state.logFollowingLatest = true;
            elements.logFrom.value = "";
            elements.logTo.value = "";
            elements.logLevel.value = "";
            elements.logKeyword.value = "";
            elements.loadMoreLogsButton.disabled = true;
            elements.latestLogsButton.disabled = true;
            elements.exportLogsButton.disabled = false;
            elements.deleteLogsButton.disabled = false;
            updateLogPagerState();
        }

        async function queryPersistedLogs(page = 1, append = false) {
            if (!state.currentLogId) {
                return;
            }

            const params = buildLogQueryParams({
                page: String(page),
                pageSize: String(state.logPageSize)
            });

            elements.queryLogsButton.disabled = true;
            elements.loadMoreLogsButton.disabled = true;
            elements.latestLogsButton.disabled = true;
            try {
                const response = await fetch(`/api/processes/${encodeURIComponent(state.currentLogId)}/logs?${params}`);
                if (!response.ok) {
                    throw new Error(await readMessage(response, "查询历史日志失败。"));
                }

                const result = await response.json();
                state.logPage = result.page;
                state.logTotal = result.total;
                const lines = result.items.map(toLogLineModel);
                if (append && elements.logConsole.children.length > 0) {
                    const previousScrollHeight = elements.logConsole.scrollHeight;
                    const previousScrollTop = elements.logConsole.scrollTop;
                    state.logFollowingLatest = false;
                    prependLogLines(lines);
                    elements.logConsole.scrollTop = previousScrollTop + (elements.logConsole.scrollHeight - previousScrollHeight);
                } else {
                    state.logFollowingLatest = true;
                    clearLogConsole();
                    if (lines.length > 0) {
                        appendLogLines(lines);
                    } else {
                        appendSystemLogLine("没有匹配的历史日志");
                    }
                    scrollTerminalToBottom();
                }
                elements.loadMoreLogsButton.disabled = result.page * result.pageSize >= result.total;
                updateLogPagerState();
            } catch (error) {
                console.error(error);
                showToast(error.message, "error");
            } finally {
                elements.queryLogsButton.disabled = false;
                elements.loadMoreLogsButton.disabled = state.logPage * state.logPageSize >= state.logTotal;
                elements.latestLogsButton.disabled = state.logFollowingLatest;
            }
        }

        function buildLogQueryParams(extra = {}) {
            const params = new URLSearchParams(extra);
            if (elements.logFrom.value) {
                params.set("from", new Date(elements.logFrom.value).toISOString());
            }
            if (elements.logTo.value) {
                params.set("to", new Date(elements.logTo.value).toISOString());
            }
            if (elements.logLevel.value) {
                params.set("level", elements.logLevel.value);
            }
            if (elements.logKeyword.value.trim()) {
                params.set("keyword", elements.logKeyword.value.trim());
            }
            return params;
        }

        async function exportLogs() {
            if (!state.currentLogId) {
                return;
            }

            elements.exportLogsButton.disabled = true;
            try {
                const params = buildLogQueryParams();
                const response = await fetch(`/api/processes/${encodeURIComponent(state.currentLogId)}/logs/export?${params}`);
                if (!response.ok) {
                    throw new Error(await readMessage(response, "导出日志失败。"));
                }

                const blob = await response.blob();
                const disposition = response.headers.get("Content-Disposition") || "";
                const match = disposition.match(/filename\*?=(?:UTF-8'')?("?)([^";]+)\1/i);
                const fileName = match ? decodeURIComponent(match[2]) : `process-${state.currentLogId}-logs.txt`;
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                link.remove();
                URL.revokeObjectURL(url);
                showToast("日志导出已开始。", "success");
            } catch (error) {
                console.error(error);
                showToast(error.message, "error");
            } finally {
                elements.exportLogsButton.disabled = false;
            }
        }

            const config = getSelectedConfig();

                    throw new Error(await readMessage(response, "删除日志失败。"));
                }

                const result = await response.json();
                state.logPage = 1;
                state.logTotal = 0;
                state.logFollowingLatest = true;
                clearLogConsole();

        function handleTerminalScroll() {
            if (!state.currentLogId || state.logPage !== 1) {
                return;
            }

            state.logFollowingLatest = isTerminalNearBottom();
            updateLogPagerState();
        }

        function updateLogPagerState() {
            if (!elements.logPageStatus || !elements.logTailState) {
                return;
            }

            const total = state.logTotal;
            const shown = Math.min(total, state.logPage * state.logPageSize);
            elements.logPageStatus.textContent = state.logPage <= 1
                ? `第 1 页 / 共 ${total} 条`
                : `已加载 1-${state.logPage} 页，显示 ${shown}/${total} 条`;
            elements.logTailState.textContent = state.logFollowingLatest ? "实时尾随" : "浏览历史，实时不跳底";
            elements.logTailState.classList.toggle("paused", !state.logFollowingLatest);
            elements.latestLogsButton.disabled = state.logFollowingLatest;
        }

        function toLogLineModel(item) {
            const date = new Date(item.timestamp);
            const fallback = parseRealtimeLogLine(item.rawLine || item.message || "");
            return {
                time: Number.isNaN(date.getTime()) ? fallback.time : formatLogTime(date),
                level: item.level || fallback.level,
                stream: item.stream || fallback.stream,
                message: item.message || fallback.message,
                rawLine: item.rawLine || fallback.rawLine
            };
        }

        function parseRealtimeLogLine(rawLine) {
            const raw = String(rawLine ?? "");
            const match = raw.match(/^\[(\d{2}:\d{2}:\d{2})\]\s*(.*)$/);
            const time = match ? match[1] : formatLogTime(new Date());
            let message = match ? match[2] : raw;
            const isError = message.startsWith("[ERROR]");
            if (isError) {
                message = message.replace(/^\[ERROR\]\s*/, "");
            }

            return {
                time,
                level: isError ? "Error" : "Info",
                stream: isError ? "stderr" : "stdout",
                message,
                rawLine: raw
            };
        }

        function appendSystemLogLine(message) {
            appendLogLine({
                time: formatLogTime(new Date()),
                level: "SYSTEM",
                stream: "system",
                message,
                rawLine: message
            });
        }

        function appendLogLines(lines) {
            for (const line of lines) {
                appendLogLine(line, false);
            }
            trimLogLines();
        }

        function prependLogLines(lines) {
            const fragment = document.createDocumentFragment();
            for (const line of lines) {
                fragment.appendChild(createLogLineElement(line));
            }
            elements.logConsole.prepend(fragment);
            trimLogLines();
        }

        function appendLogLine(line, trim = true) {
            elements.logConsole.appendChild(createLogLineElement(line));
            if (trim) {
                trimLogLines();
            }
        }

        function createLogLineElement(line) {
            const row = document.createElement("div");
            const level = String(line.level || "Info");
            const isError = level.toLowerCase() === "error" || line.stream === "stderr";
            const isSystem = level.toLowerCase() === "system" || line.stream === "system";
            row.className = `terminal-line ${isSystem ? "system" : isError ? "error" : "info"}`;

            const index = document.createElement("span");
            index.className = "terminal-index";
            index.textContent = String(elements.logConsole.children.length + 1).padStart(4, "0");

            const time = document.createElement("span");
            time.className = "terminal-time";
            time.textContent = line.time || "--:--:--";

            const levelNode = document.createElement("span");
            levelNode.className = "terminal-level";
            levelNode.textContent = isSystem ? "SYS" : isError ? "ERR" : "INFO";

            const message = document.createElement("span");
            message.className = "terminal-message";
            message.textContent = line.message || "";

            row.append(index, time, levelNode, message);
            return row;
        }

        function clearLogConsole() {
            elements.logConsole.replaceChildren();
        }

        function trimLogLines() {
            const maxLines = 5000;
            while (elements.logConsole.children.length > maxLines) {
                elements.logConsole.firstElementChild?.remove();
            }
            refreshLogLineIndexes();
        }

        function refreshLogLineIndexes() {
            let index = 1;
            for (const row of elements.logConsole.children) {
                const indexNode = row.querySelector(".terminal-index");
                if (indexNode) {
                    indexNode.textContent = String(index).padStart(4, "0");
                }
                index++;
            }
        }

        function formatLogTime(date) {
            return date.toLocaleTimeString("zh-CN", {
                hour12: false,
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit"
            });
        }

        function showModal(name) {
            state.activeModal = name;
            elements.overlay.style.display = "block";
            elements.configModal.style.display = name === "config" ? "block" : "none";
            elements.updateModal.style.display = name === "update" ? "block" : "none";
            elements.historyModal.style.display = name === "history" ? "flex" : "none";
            elements.terminalModal.style.display = name === "terminal" ? "block" : "none";
            document.body.style.overflow = "hidden";
        }

        function hideModal() {
            state.activeModal = null;
            elements.overlay.style.display = "none";
            elements.configModal.style.display = "none";
            elements.updateModal.style.display = "none";
            elements.historyModal.style.display = "none";
            elements.terminalModal.style.display = "none";
            document.body.style.overflow = "";
        }

        function refreshTerminalMeta() {
            if (!state.currentLogId) {
                return;
            }

            const status = state.statuses.get(state.currentLogId);
            const config = state.configs.find(item => item.id === state.currentLogId);
            const displayName = status?.name ?? config?.name ?? state.currentLogId;
            const pid = status?.pid ?? "-";
            const statusText = status ? getStatusMeta(status).label : "未知状态";

            elements.terminalTitle.textContent = `${displayName} 实时终端`;
            elements.terminalMeta.textContent = `PID ${pid} · ${statusText}`;
            elements.terminalLabel.textContent = `$ tail -f logs/${state.currentLogId}.log`;
        }

        function getStatusMeta(process) {
            if (process.isCircuitBroken) {
                return { label: "已熔断", className: "status-broken" };
            }

            if (process.isRunning) {
                return { label: "运行中", className: "status-running" };
            }

            if (process.isManuallyStopped) {
                return { label: "已停止", className: "status-stopped" };
            }

            return { label: "自动拉起中", className: "status-recovering" };
        }

        function createTextCell(text, className) {
            const cell = document.createElement("td");
            cell.textContent = String(text);
            if (className) {
                cell.className = className;
            }
            return cell;
        }

        function createEmptyRow(message, colspan) {
            const row = document.createElement("tr");
            const cell = document.createElement("td");
            cell.colSpan = colspan;
            cell.className = "empty-state";
            cell.textContent = message;
            row.appendChild(cell);
            return row;
        }

        function setConnectionState(text, color) {
            const bubble = elements.connectionState.querySelector("span");
            const label = elements.connectionState.querySelector("strong");
            bubble.style.background = color;
            bubble.style.boxShadow = `0 0 0 5px ${hexToRgba(color, 0.16)}`;
            label.textContent = text;
        }

        function scrollTerminalToBottom() {
            elements.logConsole.scrollTop = elements.logConsole.scrollHeight;
        }

        function isTerminalNearBottom() {
            const threshold = 48;
            return elements.logConsole.scrollHeight - elements.logConsole.scrollTop - elements.logConsole.clientHeight <= threshold;
        }

        async function readMessage(response, fallback) {
            try {
                const payload = await response.clone().json();
                return payload.message ?? fallback;
            } catch {
                return fallback;
            }
        }

        function showToast(message, type) {
            elements.toast.textContent = message;
            elements.toast.className = `toast ${type} show`;
            window.clearTimeout(showToast._timer);
            showToast._timer = window.setTimeout(() => {
                elements.toast.className = `toast ${type}`;
            }, 2600);
        }

        function hexToRgba(hex, alpha) {
            const value = hex.replace("#", "");
            const red = Number.parseInt(value.slice(0, 2), 16);
            const green = Number.parseInt(value.slice(2, 4), 16);
            const blue = Number.parseInt(value.slice(4, 6), 16);
            return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
        }
    </script>
</body>
</html>
