<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcessDaemon 控制台</title>
    <style>
        :root {
            --bg: #f3f6fb;
            --bg-accent:
                radial-gradient(circle at top left, rgba(54, 109, 255, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(17, 153, 142, 0.14), transparent 24%),
                linear-gradient(180deg, #f7f9fc 0%, #eef3f8 100%);
            --card: rgba(255, 255, 255, 0.92);
            --card-border: rgba(15, 23, 42, 0.08);
            --text: #152033;
            --muted: #64748b;
            --shadow: 0 20px 45px rgba(15, 23, 42, 0.10);
            --line: rgba(148, 163, 184, 0.16);
            --success-bg: rgba(20, 184, 121, 0.16);
            --success-text: #0f8a5f;
            --warning-bg: rgba(245, 158, 11, 0.18);
            --warning-text: #b45309;
            --neutral-bg: rgba(148, 163, 184, 0.16);
            --neutral-text: #475569;
            --blue: #1d4ed8;
            --danger: #dc2626;
            --terminal-text: #d7f9da;
            --terminal-muted: #93a5b6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Bahnschrift", "Segoe UI", sans-serif;
            color: var(--text);
            background: var(--bg);
            background-image: var(--bg-accent);
        }

        .page-shell {
            max-width: 1480px;
            margin: 0 auto;
            padding: 28px 20px 40px;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 22px;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(28px, 4vw, 42px);
            line-height: 1.04;
            letter-spacing: 0.02em;
        }

        .hero p {
            margin: 10px 0 0;
            max-width: 820px;
            color: var(--muted);
            font-size: 15px;
        }

        .signal-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid var(--card-border);
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
            color: var(--muted);
            font-size: 13px;
        }

        .signal-pill span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f59e0b;
            box-shadow: 0 0 0 5px rgba(245, 158, 11, 0.14);
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            padding: 22px 22px 16px;
        }

        .card-header h2,
        .card-header h3 {
            margin: 0;
            font-size: 20px;
        }

        .card-header p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .header-actions {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .table-wrap {
            padding: 0 18px 18px;
            overflow-x: auto;
        }

        .monitor-table {
            width: 100%;
            min-width: 960px;
            table-layout: fixed;
            border-collapse: collapse;
        }

        .col-process {
            width: auto;
        }

        .col-pid {
            width: 80px;
        }

        .col-cpu {
            width: 80px;
        }

        .col-memory {
            width: 100px;
        }

        .col-status {
            width: 100px;
        }

        .col-actions {
            width: 420px;
        }

        th,
        td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: middle;
        }

        th {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .metric,
        .mono {
            font-family: "Cascadia Mono", "Consolas", monospace;
            white-space: nowrap;
        }

        .process-name {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .process-name strong {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .process-id,
        .process-summary {
            color: var(--muted);
            font-size: 11px;
            line-height: 1.3;
        }

        .process-id {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .process-summary {
            font-family: "Cascadia Mono", "Consolas", monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: 80px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .status-badge::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.85;
        }

        .status-running {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .status-stopped {
            background: var(--neutral-bg);
            color: var(--neutral-text);
        }

        .status-recovering {
            background: var(--warning-bg);
            color: var(--warning-text);
        }

        .status-broken {
            background: rgba(99, 102, 241, 0.18);
            color: #4338ca;
        }

        .button-row {
            display: grid;
            grid-template-columns: repeat(5, minmax(64px, 1fr));
            gap: 6px;
            align-items: stretch;
            min-width: 0;
        }

        .monitor-table tbody tr.drag-over td {
            background: rgba(37, 99, 235, 0.08);
            box-shadow: inset 0 1px 0 rgba(37, 99, 235, 0.16), inset 0 -1px 0 rgba(37, 99, 235, 0.16);
        }

        .update-file-name {
            margin: 0 0 14px;
            color: var(--muted);
            font-family: "Cascadia Mono", "Consolas", monospace;
            font-size: 13px;
            word-break: break-all;
        }

        .history-list {
            display: grid;
            gap: 12px;
            max-height: calc(100vh - 190px);
            overflow-y: auto;
        }

        .history-item {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px;
            background: rgba(248, 250, 252, 0.82);
        }

        .history-item strong {
            display: block;
            margin-bottom: 6px;
        }

        .history-item dl {
            display: grid;
            grid-template-columns: 96px minmax(0, 1fr);
            gap: 6px 10px;
            margin: 0;
            color: var(--muted);
            font-size: 12px;
        }

        .history-item dt {
            font-weight: 700;
        }

        .history-item dd {
            margin: 0;
            min-width: 0;
            overflow-wrap: anywhere;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
        }

        .action-button {
            width: 100%;
            min-width: 72px;
            white-space: nowrap;
        }

        .btn-primary {
            color: white;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
        }

        .btn-success {
            color: white;
            background: linear-gradient(135deg, #16a34a, #15803d);
            box-shadow: 0 12px 24px rgba(22, 163, 74, 0.22);
        }

        .btn-danger {
            color: white;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 12px 24px rgba(220, 38, 38, 0.22);
        }

        .btn-secondary {
            color: var(--text);
            background: rgba(226, 232, 240, 0.9);
        }

        .btn-ghost {
            color: var(--blue);
            background: rgba(59, 130, 246, 0.10);
        }

        .empty-state {
            padding: 28px 16px;
            text-align: center;
            color: var(--muted);
        }

        .toast {
            position: fixed;
            top: 22px;
            right: 22px;
            min-width: 240px;
            max-width: 360px;
            padding: 14px 16px;
            border-radius: 18px;
            color: white;
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.18);
            opacity: 0;
            transform: translateY(-12px);
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 1200;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            background: linear-gradient(135deg, #059669, #047857);
        }

        .toast.error {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
        }

        .toast.info {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.5);
            backdrop-filter: blur(6px);
            z-index: 1000;
        }

        .modal-card {
            display: none;
            position: fixed;
            z-index: 1100;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid var(--card-border);
            box-shadow: 0 30px 80px rgba(2, 6, 23, 0.42);
            backdrop-filter: blur(14px);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            padding: 20px 22px 16px;
            border-bottom: 1px solid var(--line);
        }

        .modal-header h3 {
            margin: 0;
            font-size: 20px;
        }

        .modal-header p {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .modal-close {
            padding: 10px 12px;
            background: rgba(148, 163, 184, 0.12);
            color: var(--text);
        }

        .config-modal {
            top: 50%;
            left: 50%;
            width: min(640px, calc(100vw - 28px));
            max-height: calc(100vh - 32px);
            transform: translate(-50%, -50%);
        }

        .config-modal-body {
            padding: 20px 22px 22px;
            overflow-y: auto;
            max-height: calc(100vh - 120px);
        }

        .config-modal-note {
            margin: 0 0 16px;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(59, 130, 246, 0.09);
            color: #1d4ed8;
            font-size: 13px;
        }

        form {
            display: grid;
            gap: 14px;
        }

        .field-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field label {
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
        }

        .field input {
            width: 100%;
            border: 1px solid rgba(148, 163, 184, 0.32);
            border-radius: 14px;
            padding: 12px 14px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.86);
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .field input:focus {
            border-color: rgba(37, 99, 235, 0.5);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
        }

        .field input:disabled {
            background: rgba(226, 232, 240, 0.54);
            color: var(--muted);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding-top: 4px;
        }

        .terminal-modal {
            inset: 6vh 6vw;
            background: rgba(18, 24, 34, 0.98);
            border: 1px solid rgba(148, 163, 184, 0.22);
        }

        .terminal-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(13, 17, 23, 0.96);
        }

        .terminal-dots {
            display: inline-flex;
            gap: 8px;
        }

        .terminal-dots span {
            width: 11px;
            height: 11px;
            border-radius: 50%;
        }

        .terminal-dots span:nth-child(1) { background: #ff5f57; }
        .terminal-dots span:nth-child(2) { background: #febc2e; }
        .terminal-dots span:nth-child(3) { background: #28c840; }

        .terminal-heading {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .terminal-heading strong {
            color: white;
            font-size: 15px;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        .terminal-heading small {
            color: var(--terminal-muted);
            font-size: 12px;
        }

        .terminal-close {
            padding: 10px 12px;
            background: rgba(148, 163, 184, 0.12);
            color: #f8fafc;
        }

        .terminal-body {
            height: calc(100% - 68px);
            padding: 18px;
            background:
                linear-gradient(rgba(148, 163, 184, 0.04) 1px, transparent 1px) 0 0 / 100% 32px,
                linear-gradient(90deg, rgba(148, 163, 184, 0.03) 1px, transparent 1px) 0 0 / 32px 100%,
                linear-gradient(180deg, rgba(13, 17, 23, 1) 0%, rgba(9, 14, 21, 1) 100%);
        }

        .terminal-frame {
            height: 100%;
            border: 1px solid rgba(148, 163, 184, 0.14);
            border-radius: 18px;
            overflow: hidden;
            background: rgba(4, 8, 15, 0.72);
            display: flex;
            flex-direction: column;
        }

        .terminal-label {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.14);
            color: var(--terminal-muted);
            font-family: "Cascadia Mono", "Consolas", monospace;
            font-size: 12px;
        }

        .terminal-console {
            flex: 1;
            margin: 0;
            padding: 16px 18px 20px;
            overflow-y: auto;
            color: var(--terminal-text);
            font-family: "Cascadia Mono", "Consolas", monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        @media (max-width: 960px) {
            .card-header,
            .hero {
                flex-direction: column;
            }
        }

        @media (max-width: 720px) {
            .page-shell {
                padding: 20px 14px 30px;
            }

            .field-grid {
                grid-template-columns: 1fr;
            }

            .card-header,
            .modal-header,
            .config-modal-body {
                padding-left: 18px;
                padding-right: 18px;
            }

            .terminal-modal {
                inset: 2vh 2vw;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <section class="hero">
            <div>
            </div>
            <div class="signal-pill" id="connectionState">
                <span></span>
                <strong>连接中</strong>
            </div>
        </section>

        <article class="card">
            <div class="card-header">
                <div>
                    <h2>进程监控</h2>
                </div>
                <div class="header-actions">
                    <button type="button" class="btn-primary" id="openConfigButton">新增进程</button>
                </div>
            </div>
            <div class="table-wrap">
                <table class="monitor-table">
                    <colgroup>
                        <col class="col-process">
                        <col class="col-pid">
                        <col class="col-cpu">
                        <col class="col-memory">
                        <col class="col-status">
                        <col class="col-actions">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>进程</th>
                            <th>PID</th>
                            <th>CPU</th>
                            <th>内存</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="statusTableBody"></tbody>
                </table>
            </div>
        </article>
    </div>

    <div class="toast" id="toast"></div>
    <div class="overlay" id="overlay"></div>

    <section class="modal-card config-modal" id="configModal">
        <div class="modal-header">
            <div>
                <h3 id="formTitle">新增进程</h3>
                <p id="formSubtitle">填写基础配置后保存。编辑模式下 ID 固定不可改。</p>
            </div>
            <button class="modal-close" type="button" id="closeConfigButton">关闭</button>
        </div>
        <div class="config-modal-body">
            <p class="config-modal-note">配置保存后不会自动启动进程。正在运行的进程若修改了配置，需要手动停止后重新启动才会按新配置生效。</p>
            <form id="configForm">
                <div class="field-grid">
                    <div class="field">
                        <label for="processId">ID</label>
                        <input id="processId" name="id" placeholder="例如：collector-01" required>
                    </div>
                    <div class="field">
                        <label for="processName">名称</label>
                        <input id="processName" name="name" placeholder="例如：频谱数据采集服务" required>
                    </div>
                </div>

                <div class="field">
                    <label for="dllPath">DLL 路径</label>
                    <input id="dllPath" name="dllPath" placeholder="例如：/home/ichinesebulbul/xxx.dll" required>
                </div>

                <div class="field">
                    <label for="arguments">启动参数</label>
                    <input id="arguments" name="arguments" placeholder="例如：--port 5001">
                </div>

                <div class="field">
                    <label for="startupDelayMs">启动延迟（毫秒）</label>
                    <input id="startupDelayMs" name="startupDelayMs" type="number" min="0" step="100" value="5000" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="saveButton">保存配置</button>
                    <button type="button" class="btn-secondary" id="resetButton">重置表单</button>
                </div>
            </form>
        </div>
    </section>

    <section class="modal-card config-modal" id="updateModal">
        <div class="modal-header">
            <div>
                <h3 id="updateTitle">上传更新包</h3>
                <p id="updateSubtitle">更新前会自动备份目标目录，成功后会重启进程。</p>
            </div>
            <button class="modal-close" type="button" id="closeUpdateButton">关闭</button>
        </div>
        <div class="config-modal-body">
            <p class="update-file-name" id="updateFileName"></p>
            <form id="updateForm">
                <div class="field">
                    <label for="updatePassword">压缩包密码</label>
                    <input id="updatePassword" name="password" type="password" placeholder="无密码可留空">
                </div>
                <div class="form-actions">
                    <button class="btn-primary" type="submit" id="uploadUpdateButton">开始更新</button>
                    <button class="btn-secondary" type="button" id="cancelUpdateButton">取消</button>
                </div>
            </form>
        </div>
    </section>

    <section class="modal-card config-modal" id="historyModal">
        <div class="modal-header">
            <div>
                <h3 id="historyTitle">更新历史</h3>
                <p id="historySubtitle">展示该进程每次更新和备份记录。</p>
            </div>
            <button class="modal-close" type="button" id="closeHistoryButton">关闭</button>
        </div>
        <div class="config-modal-body">
            <div class="history-list" id="historyList"></div>
        </div>
    </section>

    <section class="modal-card terminal-modal" id="terminalModal">
        <div class="terminal-topbar">
            <div class="terminal-dots" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="terminal-heading">
                <strong id="terminalTitle">终端日志</strong>
                <small id="terminalMeta">等待选择进程...</small>
            </div>
            <button class="terminal-close" type="button" id="closeTerminalButton">关闭</button>
        </div>
        <div class="terminal-body">
            <div class="terminal-frame">
                <div class="terminal-label" id="terminalLabel">$ tail -f logs/process.log</div>
                <pre class="terminal-console" id="logConsole"></pre>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script>
        const state = {
            configs: [],
            statuses: new Map(),
            rowRefs: new Map(),
            editingId: null,
            currentLogId: null,
            pendingUpdate: null,
            activeModal: null
        };

        const elements = {
            statusTableBody: document.getElementById("statusTableBody"),
            configForm: document.getElementById("configForm"),
            processId: document.getElementById("processId"),
            processName: document.getElementById("processName"),
            dllPath: document.getElementById("dllPath"),
            arguments: document.getElementById("arguments"),
            startupDelayMs: document.getElementById("startupDelayMs"),
            formTitle: document.getElementById("formTitle"),
            formSubtitle: document.getElementById("formSubtitle"),
            saveButton: document.getElementById("saveButton"),
            resetButton: document.getElementById("resetButton"),
            openConfigButton: document.getElementById("openConfigButton"),
            closeConfigButton: document.getElementById("closeConfigButton"),
            toast: document.getElementById("toast"),
            connectionState: document.getElementById("connectionState"),
            overlay: document.getElementById("overlay"),
            configModal: document.getElementById("configModal"),
            terminalModal: document.getElementById("terminalModal"),
            terminalTitle: document.getElementById("terminalTitle"),
            terminalMeta: document.getElementById("terminalMeta"),
            terminalLabel: document.getElementById("terminalLabel"),
            logConsole: document.getElementById("logConsole"),
            closeTerminalButton: document.getElementById("closeTerminalButton"),
            updateModal: document.getElementById("updateModal"),
            updateForm: document.getElementById("updateForm"),
            updateTitle: document.getElementById("updateTitle"),
            updateSubtitle: document.getElementById("updateSubtitle"),
            updateFileName: document.getElementById("updateFileName"),
            updatePassword: document.getElementById("updatePassword"),
            uploadUpdateButton: document.getElementById("uploadUpdateButton"),
            closeUpdateButton: document.getElementById("closeUpdateButton"),
            cancelUpdateButton: document.getElementById("cancelUpdateButton"),
            historyModal: document.getElementById("historyModal"),
            historyTitle: document.getElementById("historyTitle"),
            historySubtitle: document.getElementById("historySubtitle"),
            historyList: document.getElementById("historyList"),
            closeHistoryButton: document.getElementById("closeHistoryButton")
        };

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/monitor")
            .withAutomaticReconnect()
            .build();

        connection.on("ReceiveStatuses", processes => {
            state.statuses = new Map(processes.map(process => [process.id, process]));
            updateAllStatusRows();
            refreshTerminalMeta();
        });

        connection.on("ReceiveHistoryLogs", (id, logs) => {
            if (state.currentLogId !== id) {
                return;
            }

            elements.logConsole.textContent = logs.length > 0
                ? `${logs.join("\n")}\n`
                : "[日志缓冲区为空]\n";
            scrollTerminalToBottom();
        });

        connection.on("ReceiveLog", (id, logText) => {
            if (state.currentLogId !== id) {
                return;
            }

            elements.logConsole.textContent += `${logText}\n`;
            scrollTerminalToBottom();
        });

        connection.onreconnecting(() => setConnectionState("重连中", "#f59e0b"));
        connection.onreconnected(() => setConnectionState("已连接", "#16a34a"));
        connection.onclose(() => setConnectionState("已断开", "#dc2626"));

        elements.configForm.addEventListener("submit", saveProcessConfig);
        elements.resetButton.addEventListener("click", resetForm);
        elements.openConfigButton.addEventListener("click", () => openConfigModal());
        elements.closeConfigButton.addEventListener("click", closeConfigModal);
        elements.closeTerminalButton.addEventListener("click", () => closeActiveModal());
        elements.updateForm.addEventListener("submit", uploadUpdatePackage);
        elements.closeUpdateButton.addEventListener("click", closeUpdateModal);
        elements.cancelUpdateButton.addEventListener("click", closeUpdateModal);
        elements.closeHistoryButton.addEventListener("click", closeHistoryModal);
        elements.overlay.addEventListener("click", () => closeActiveModal());
        document.addEventListener("keydown", event => {
            if (event.key === "Escape") {
                closeActiveModal();
            }
        });

        initialize();

        async function initialize() {
            setConnectionState("连接中", "#f59e0b");
            await Promise.all([startSignalR(), loadConfigs()]);
            rebuildStatusRows();
            updateAllStatusRows();
        }

        async function startSignalR() {
            try {
                await connection.start();
                setConnectionState("已连接", "#16a34a");
            } catch (error) {
                console.error(error);
                setConnectionState("连接失败", "#dc2626");
                showToast("SignalR 连接失败，请刷新页面重试。", "error");
            }
        }

        async function loadConfigs() {
            try {
                const response = await fetch("/api/processes");
                if (!response.ok) {
                    throw new Error(await readMessage(response, "加载配置失败。"));
                }

                state.configs = await response.json();
                rebuildStatusRows();
                updateAllStatusRows();
                refreshTerminalMeta();
            } catch (error) {
                console.error(error);
                showToast(error.message, "error");
            }
        }

        function rebuildStatusRows() {
            elements.statusTableBody.replaceChildren();
            state.rowRefs.clear();

            if (state.configs.length === 0) {
                elements.statusTableBody.appendChild(createEmptyRow("当前还没有配置任何进程。", 6));
                return;
            }

            for (const config of state.configs) {
                const row = document.createElement("tr");
                row.id = `row-${config.id}`;
                wireUpdateDrop(row, config);

                const nameCell = document.createElement("td");
                const nameWrap = document.createElement("div");
                nameWrap.className = "process-name";

                const nameStrong = document.createElement("strong");
                nameStrong.textContent = config.name;

                const idLine = document.createElement("small");
                idLine.className = "process-id";
                idLine.textContent = config.id;

                const summaryLine = document.createElement("small");
                summaryLine.className = "process-summary";
                summaryLine.textContent = buildSummary(config);
                summaryLine.title = buildSummary(config);

                nameWrap.appendChild(nameStrong);
                nameWrap.appendChild(idLine);
                nameWrap.appendChild(summaryLine);
                nameCell.appendChild(nameWrap);

                const pidCell = createTextCell("-", "mono");
                const cpuCell = createTextCell("-", "metric");
                const memoryCell = createTextCell("-", "metric");

                const statusCell = document.createElement("td");
                const statusBadge = document.createElement("span");
                statusBadge.className = "status-badge status-stopped";
                statusBadge.textContent = "已停止";
                statusCell.appendChild(statusBadge);

                const actionCell = document.createElement("td");
                const buttons = document.createElement("div");
                buttons.className = "button-row";

                const terminalButton = createActionButton("终端", "btn-secondary");
                terminalButton.addEventListener("click", () => openTerminal(config.id));

                const toggleButton = createActionButton("启动", "btn-success");

                const historyButton = createActionButton("历史", "btn-secondary");
                historyButton.addEventListener("click", () => openHistoryModal(config));

                const editButton = createActionButton("编辑", "btn-ghost");
                editButton.addEventListener("click", () => openConfigModal(config));

                const deleteButton = createActionButton("删除", "btn-secondary");
                deleteButton.addEventListener("click", () => deleteProcess(config));

                buttons.appendChild(terminalButton);
                buttons.appendChild(toggleButton);
                buttons.appendChild(historyButton);
                buttons.appendChild(editButton);
                buttons.appendChild(deleteButton);
                actionCell.appendChild(buttons);

                row.append(nameCell, pidCell, cpuCell, memoryCell, statusCell, actionCell);
                elements.statusTableBody.appendChild(row);

                state.rowRefs.set(config.id, {
                    row,
                    nameStrong,
                    idLine,
                    summaryLine,
                    pidCell,
                    cpuCell,
                    memoryCell,
                    statusBadge,
                    toggleButton
                });
            }
        }

        function updateAllStatusRows() {
            if (state.configs.length === 0) {
                return;
            }

            for (const config of state.configs) {
                updateStatusRow(config.id);
            }
        }

        function updateStatusRow(id) {
            const config = state.configs.find(item => item.id === id);
            const refs = state.rowRefs.get(id);

            if (!config || !refs) {
                return;
            }

            const process = state.statuses.get(id) ?? createStatusFallback(config);
            const summary = buildSummary(config);
            const statusMeta = getStatusMeta(process);

            refs.nameStrong.textContent = config.name;
            refs.idLine.textContent = config.id;
            refs.summaryLine.textContent = summary;
            refs.summaryLine.title = summary;
            refs.pidCell.textContent = process.pid ?? "-";
            refs.cpuCell.textContent = process.isRunning ? `${process.cpuUsage.toFixed(1)}%` : "-";
            refs.memoryCell.textContent = process.isRunning ? `${process.memoryMb.toFixed(1)} MB` : "-";
            refs.statusBadge.className = `status-badge ${statusMeta.className}`;
            refs.statusBadge.textContent = statusMeta.label;
            refs.toggleButton.className = `action-button ${process.isRunning ? "btn-danger" : "btn-success"}`;
            refs.toggleButton.textContent = process.isRunning ? "停止" : "启动";
            refs.toggleButton.onclick = () => toggleProcess(id);
        }

        function buildSummary(config) {
            return `${config.dllPath} · 延迟 ${config.startupDelayMs} ms`;
        }

        function createStatusFallback(config) {
            return {
                id: config.id,
                name: config.name,
                pid: null,
                isRunning: false,
                isManuallyStopped: true,
                isCircuitBroken: false,
                cpuUsage: 0,
                memoryMb: 0
            };
        }

        function createActionButton(label, className) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = `action-button ${className}`;
            button.textContent = label;
            return button;
        }

        function wireUpdateDrop(row, config) {
            row.addEventListener("dragover", event => {
                if (!event.dataTransfer || event.dataTransfer.types.includes("Files") === false) {
                    return;
                }

                event.preventDefault();
                row.classList.add("drag-over");
            });

            row.addEventListener("dragleave", event => {
                if (!row.contains(event.relatedTarget)) {
                    row.classList.remove("drag-over");
                }
            });

            row.addEventListener("drop", event => {
                event.preventDefault();
                row.classList.remove("drag-over");

                const file = event.dataTransfer?.files?.[0];
                if (!file) {
                    return;
                }

                if (!isSupportedUpdatePackage(file.name)) {
                    showToast("仅支持 .zip 或 .rar 更新包。", "error");
                    return;
                }

                openUpdateModal(config, file);
            });
        }

        function isSupportedUpdatePackage(fileName) {
            return /\.(zip|rar)$/i.test(fileName);
        }

        async function openUpdateModal(config, file) {
            await closeActiveModal();

            state.pendingUpdate = { config, file };
            elements.updatePassword.value = "";
            elements.updateTitle.textContent = `更新 ${config.name}`;
            elements.updateSubtitle.textContent = `目标目录：${getTargetDirectoryText(config.dllPath)}`;
            elements.updateFileName.textContent = `${file.name} · ${formatBytes(file.size)}`;
            elements.uploadUpdateButton.disabled = false;
            elements.uploadUpdateButton.textContent = "开始更新";
            showModal("update");
        }

        function closeUpdateModal() {
            if (state.activeModal !== "update") {
                return;
            }

            state.pendingUpdate = null;
            elements.updateForm.reset();
            hideModal();
        }

        async function uploadUpdatePackage(event) {
            event.preventDefault();

            if (!state.pendingUpdate) {
                return;
            }

            const { config, file } = state.pendingUpdate;
            const formData = new FormData();
            formData.append("file", file);
            formData.append("password", elements.updatePassword.value.trim());

            elements.uploadUpdateButton.disabled = true;
            elements.uploadUpdateButton.textContent = "更新中...";

            try {
                const response = await fetch(`/api/processes/${encodeURIComponent(config.id)}/updates`, {
                    method: "POST",
                    body: formData
                });

                const message = await readMessage(response, "更新失败。");
                if (!response.ok) {
                    throw new Error(message);
                }

                showToast(message, "success");
                closeUpdateModal();
                await loadConfigs();
            } catch (error) {
                console.error(error);
                showToast(error.message, "error");
                elements.uploadUpdateButton.disabled = false;
                elements.uploadUpdateButton.textContent = "开始更新";
            }
        }

        async function openHistoryModal(config) {
            await closeActiveModal();

            elements.historyTitle.textContent = `${config.name} 更新历史`;
            elements.historySubtitle.textContent = config.id;
            elements.historyList.replaceChildren(createHistoryEmpty("正在加载更新历史..."));
            showModal("history");

            try {
                const response = await fetch(`/api/processes/${encodeURIComponent(config.id)}/updates`);
                if (!response.ok) {
                    throw new Error(await readMessage(response, "加载更新历史失败。"));
                }

                const records = await response.json();
                renderHistory(records);
            } catch (error) {
                console.error(error);
                elements.historyList.replaceChildren(createHistoryEmpty(error.message));
            }
        }

        function closeHistoryModal() {
            if (state.activeModal !== "history") {
                return;
            }

            elements.historyList.replaceChildren();
            hideModal();
        }

        function renderHistory(records) {
            elements.historyList.replaceChildren();

            if (!records || records.length === 0) {
                elements.historyList.appendChild(createHistoryEmpty("暂无更新记录。"));
                return;
            }

            for (const record of records) {
                const item = document.createElement("article");
                item.className = "history-item";

                const title = document.createElement("strong");
                title.textContent = `${getUpdateStatusLabel(record.status)} · ${record.originalFileName}`;

                const details = document.createElement("dl");
                appendHistoryDetail(details, "开始时间", formatDateTime(record.startedAt));
                appendHistoryDetail(details, "结束时间", record.finishedAt ? formatDateTime(record.finishedAt) : "-");
                appendHistoryDetail(details, "文件大小", formatBytes(record.fileSizeBytes));
                appendHistoryDetail(details, "目标目录", record.targetDirectory);
                appendHistoryDetail(details, "备份目录", record.backupDirectory || "-");
                appendHistoryDetail(details, "重启结果", record.restartSucceeded ? "成功" : "未成功");
                if (record.errorMessage) {
                    appendHistoryDetail(details, "错误信息", record.errorMessage);
                }

                item.append(title, details);
                elements.historyList.appendChild(item);
            }
        }

        function appendHistoryDetail(list, label, value) {
            const term = document.createElement("dt");
            term.textContent = label;
            const description = document.createElement("dd");
            description.textContent = value;
            list.append(term, description);
        }

        function createHistoryEmpty(message) {
            const empty = document.createElement("div");
            empty.className = "empty-state";
            empty.textContent = message;
            return empty;
        }

        function getUpdateStatusLabel(status) {
            if (status === "Succeeded") {
                return "更新成功";
            }

            if (status === "RestartFailed") {
                return "重启失败";
            }

            if (status === "Running") {
                return "更新中";
            }

            return "更新失败";
        }

        function getTargetDirectoryText(dllPath) {
            const normalized = dllPath.replaceAll("\\", "/");
            const index = normalized.lastIndexOf("/");
            return index >= 0 ? normalized.slice(0, index) : ".";
        }

        function formatBytes(value) {
            if (!Number.isFinite(value)) {
                return "-";
            }

            if (value < 1024) {
                return `${value} B`;
            }

            if (value < 1024 * 1024) {
                return `${(value / 1024).toFixed(1)} KB`;
            }

            return `${(value / 1024 / 1024).toFixed(1)} MB`;
        }

        function formatDateTime(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return "-";
            }

            return date.toLocaleString();
        }

        async function openConfigModal(config = null) {
            if (state.activeModal === "terminal") {
                await closeTerminalModal();
            }

            resetForm();

            if (config) {
                state.editingId = config.id;
                elements.processId.value = config.id;
                elements.processName.value = config.name;
                elements.dllPath.value = config.dllPath;
                elements.arguments.value = config.arguments ?? "";
                elements.startupDelayMs.value = config.startupDelayMs;
                elements.processId.disabled = true;
                elements.formTitle.textContent = "编辑进程";
                elements.formSubtitle.textContent = "配置会保存到运行时 JSON 文件。正在运行的进程需要重启后才会按新配置生效。";
                elements.saveButton.textContent = "保存修改";
            }

            showModal("config");
        }

        function closeConfigModal() {
            if (state.activeModal !== "config") {
                return;
            }

            resetForm();
            hideModal();
        }

        function resetForm() {
            state.editingId = null;
            elements.configForm.reset();
            elements.processId.disabled = false;
            elements.startupDelayMs.value = 5000;
            elements.formTitle.textContent = "新增进程";
            elements.formSubtitle.textContent = "填写基础配置后保存。编辑模式下 ID 固定不可改。";
            elements.saveButton.textContent = "保存配置";
        }

        async function saveProcessConfig(event) {
            event.preventDefault();

            const payload = {
                id: elements.processId.value.trim(),
                name: elements.processName.value.trim(),
                dllPath: elements.dllPath.value.trim(),
                arguments: elements.arguments.value.trim(),
                startupDelayMs: Number(elements.startupDelayMs.value)
            };

            const isEditing = state.editingId !== null;
            const url = isEditing ? `/api/processes/${encodeURIComponent(payload.id)}` : "/api/processes";
            const method = isEditing ? "PUT" : "POST";

            try {
                const response = await fetch(url, {
                    method,
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const message = await readMessage(response, isEditing ? "保存配置失败。" : "新增配置失败。");
                if (!response.ok) {
                    throw new Error(message);
                }

                const result = await response.json();
                showToast(result.message ?? message, result.restartRequired ? "info" : "success");
                closeConfigModal();
                await loadConfigs();
            } catch (error) {
                console.error(error);
                showToast(error.message, "error");
            }
        }

        async function deleteProcess(config) {
            const confirmed = window.confirm(`确定删除进程“${config.name}”吗？如果它正在运行，会先停止再删除。`);
            if (!confirmed) {
                return;
            }

            try {
                const response = await fetch(`/api/processes/${encodeURIComponent(config.id)}`, {
                    method: "DELETE"
                });

                const message = await readMessage(response, "删除配置失败。");
                if (!response.ok) {
                    throw new Error(message);
                }

                if (state.currentLogId === config.id && state.activeModal === "terminal") {
                    await closeTerminalModal();
                }

                if (state.editingId === config.id && state.activeModal === "config") {
                    closeConfigModal();
                }

                showToast(message, "success");
                await loadConfigs();
            } catch (error) {
                console.error(error);
                showToast(error.message, "error");
            }
        }

        async function toggleProcess(id) {
            const process = state.statuses.get(id) ?? createStatusFallback({
                id,
                name: id,
                dllPath: "",
                arguments: "",
                startupDelayMs: 0
            });
            const config = state.configs.find(item => item.id === id);
            const methodName = process.isRunning ? "StopProcess" : "StartProcess";

            try {
                await connection.invoke(methodName, id);
                if (config) {
                    showToast(`${config.name} 已发送${process.isRunning ? "停止" : "启动"}指令。`, "info");
                }
            } catch (error) {
                console.error(error);
                if (config) {
                    showToast(`${config.name}${process.isRunning ? "停止" : "启动"}失败。`, "error");
                }
            }
        }

        async function openTerminal(id) {
            if (state.activeModal === "config") {
                closeConfigModal();
            } else if (state.activeModal === "terminal") {
                await closeTerminalModal();
            }

            state.currentLogId = id;
            elements.logConsole.textContent = "正在连接日志流...\n";
            refreshTerminalMeta();
            showModal("terminal");

            try {
                await connection.invoke("SubscribeLogs", id);
            } catch (error) {
                console.error(error);
                showToast("订阅日志失败。", "error");
            }
        }

        async function closeTerminalModal() {
            if (state.activeModal !== "terminal" && !state.currentLogId) {
                hideModal();
                return;
            }

            const closingId = state.currentLogId;
            state.currentLogId = null;
            hideModal();

            if (!closingId) {
                return;
            }

            try {
                await connection.invoke("UnsubscribeLogs", closingId);
            } catch (error) {
                console.error(error);
            }
        }

        async function closeActiveModal() {
            if (state.activeModal === "terminal") {
                await closeTerminalModal();
            } else if (state.activeModal === "config") {
                closeConfigModal();
            } else if (state.activeModal === "update") {
                closeUpdateModal();
            } else if (state.activeModal === "history") {
                closeHistoryModal();
            }
        }

        function showModal(name) {
            state.activeModal = name;
            elements.overlay.style.display = "block";
            elements.configModal.style.display = name === "config" ? "block" : "none";
            elements.updateModal.style.display = name === "update" ? "block" : "none";
            elements.historyModal.style.display = name === "history" ? "block" : "none";
            elements.terminalModal.style.display = name === "terminal" ? "block" : "none";
            document.body.style.overflow = "hidden";
        }

        function hideModal() {
            state.activeModal = null;
            elements.overlay.style.display = "none";
            elements.configModal.style.display = "none";
            elements.updateModal.style.display = "none";
            elements.historyModal.style.display = "none";
            elements.terminalModal.style.display = "none";
            document.body.style.overflow = "";
        }

        function refreshTerminalMeta() {
            if (!state.currentLogId) {
                return;
            }

            const status = state.statuses.get(state.currentLogId);
            const config = state.configs.find(item => item.id === state.currentLogId);
            const displayName = status?.name ?? config?.name ?? state.currentLogId;
            const pid = status?.pid ?? "-";
            const statusText = status ? getStatusMeta(status).label : "未知状态";

            elements.terminalTitle.textContent = `${displayName} 实时终端`;
            elements.terminalMeta.textContent = `PID ${pid} · ${statusText}`;
            elements.terminalLabel.textContent = `$ tail -f logs/${state.currentLogId}.log`;
        }

        function getStatusMeta(process) {
            if (process.isCircuitBroken) {
                return { label: "已熔断", className: "status-broken" };
            }

            if (process.isRunning) {
                return { label: "运行中", className: "status-running" };
            }

            if (process.isManuallyStopped) {
                return { label: "已停止", className: "status-stopped" };
            }

            return { label: "自动拉起中", className: "status-recovering" };
        }

        function createTextCell(text, className) {
            const cell = document.createElement("td");
            cell.textContent = String(text);
            if (className) {
                cell.className = className;
            }
            return cell;
        }

        function createEmptyRow(message, colspan) {
            const row = document.createElement("tr");
            const cell = document.createElement("td");
            cell.colSpan = colspan;
            cell.className = "empty-state";
            cell.textContent = message;
            row.appendChild(cell);
            return row;
        }

        function setConnectionState(text, color) {
            const bubble = elements.connectionState.querySelector("span");
            const label = elements.connectionState.querySelector("strong");
            bubble.style.background = color;
            bubble.style.boxShadow = `0 0 0 5px ${hexToRgba(color, 0.16)}`;
            label.textContent = text;
        }

        function scrollTerminalToBottom() {
            elements.logConsole.scrollTop = elements.logConsole.scrollHeight;
        }

        async function readMessage(response, fallback) {
            try {
                const payload = await response.clone().json();
                return payload.message ?? fallback;
            } catch {
                return fallback;
            }
        }

        function showToast(message, type) {
            elements.toast.textContent = message;
            elements.toast.className = `toast ${type} show`;
            window.clearTimeout(showToast._timer);
            showToast._timer = window.setTimeout(() => {
                elements.toast.className = `toast ${type}`;
            }, 2600);
        }

        function hexToRgba(hex, alpha) {
            const value = hex.replace("#", "");
            const red = Number.parseInt(value.slice(0, 2), 16);
            const green = Number.parseInt(value.slice(2, 4), 16);
            const blue = Number.parseInt(value.slice(4, 6), 16);
            return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
        }
    </script>
</body>
</html>
